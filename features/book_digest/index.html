<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Digest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../assets/styles/global.css" />
    <link rel="stylesheet" href="../../assets/styles/book-digest.css" />
  </head>
  <body>
    <div class="page-shell">
      <a class="back-link" href="../../index.html">返回目录</a>

      <main class="digest-layout">
        <section class="topbar-panel">
          <div class="mode-switch" role="tablist" aria-label="页面模式">
            <button id="readerModeBtn" class="mode-btn is-active" type="button" aria-selected="true">用户端</button>
            <button id="adminModeBtn" class="mode-btn" type="button" aria-selected="false">管理端</button>
          </div>
        </section>

        <section id="readerSection" class="reader-shell">
          <section class="panel library-panel">
            <div class="section-heading">
              <div>
                <p class="section-kicker">Published Library</p>
                <h2>已发布书单</h2>
              </div>
            </div>
            <div id="libraryList" class="library-list empty-state">正在加载书单...</div>
          </section>

          <section class="reader-stage">
            <div class="phone-frame">
              <div class="phone-glow"></div>
              <article class="panel reader-card">
                <div class="reader-card-head">
                  <div class="reader-title-block">
                    <h2 id="readerBookTitle">选择一本书</h2>
                  </div>
                </div>

                <div class="reader-progress-row">
                  <span id="readerProgressBadge" class="reader-progress-badge">0 / 0</span>
                  <div class="progress-track" aria-hidden="true">
                    <div id="readerProgressFill" class="progress-fill"></div>
                  </div>
                </div>

                <div id="readerSlide" class="reader-slide empty-state">请选择左侧的一本书开始阅读。</div>

                <button id="prevSlideBtn" class="reader-nav-btn reader-nav-btn-left" type="button" aria-label="上一页">‹</button>
                <button id="nextSlideBtn" class="reader-nav-btn reader-nav-btn-right" type="button" aria-label="下一页">›</button>
              </article>
            </div>
          </section>
        </section>

        <section id="adminSection" class="admin-shell hidden">
          <section class="panel admin-form-panel">
            <div class="section-heading">
              <div>
                <p class="section-kicker">Admin</p>
                <h2>内容生产台</h2>
                <p class="section-description">直接输入最终稿。段落之间空一行，系统会按空行拆成翻页内容。</p>
              </div>
            </div>

            <div class="field-grid">
              <label class="input-card" for="bookTitleInput">
                <span class="input-label">书名</span>
                <input id="bookTitleInput" type="text" placeholder="例如：小王子" />
              </label>
              <label class="input-card" for="bookAuthorInput">
                <span class="input-label">作者</span>
                <input id="bookAuthorInput" type="text" placeholder="例如：安托万·德·圣-埃克苏佩里" />
              </label>
            </div>

            <label class="input-card textarea-card" for="bookContentInput">
              <span class="input-label">内容</span>
              <textarea id="bookContentInput" rows="18" placeholder="每一页写成一段，段落之间空一行。"></textarea>
            </label>

            <div class="admin-toolbar">
              <button id="loadPublishedBtn" class="ghost-btn" type="button">载入当前书籍</button>
              <button id="publishJsonBtn" class="primary-btn" type="button">发布</button>
            </div>
            <p id="saveStatus" class="footnote">发布会写入 `data/book-digest/books/` 并同步更新书单索引。</p>
          </section>
        </section>
      </main>
    </div>

    <script src="../../assets/scripts/book-digest.js"></script>
  </body>
</html>
